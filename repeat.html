<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>עוד פעם</title>
<style>
  :root {
    --navy:       #0d1b2a;
    --navy2:      #122236;
    --navy3:      #1a3050;
    --brown:      #5c3d2e;
    --brown2:     #7a5240;
    --brown-warm: #a0694a;
    --pink:       #d4849a;
    --pink-soft:  #e8b4c0;
    --pink-pale:  #f2d5dc;
    --cream:      #f5ede8;
    --gold:       #c9a96e;
    --gold-soft:  #e8cc99;
    --text:       #f0e6e0;
    --text-dim:   #a89890;
    --border:     rgba(212,132,154,0.15);
    --border2:    rgba(212,132,154,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 80px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(26,48,80,0.9) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 20%, rgba(212,132,154,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 30% 20% at 20% 60%, rgba(201,169,110,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 12%, rgba(245,237,232,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 8%,  rgba(245,237,232,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 44% 22%, rgba(245,237,232,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 35%, rgba(245,237,232,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 6%  40%, rgba(245,237,232,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 5%,  rgba(245,237,232,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 32% 50%, rgba(245,237,232,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 91% 15%, rgba(201,169,110,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 25% 30%, rgba(201,169,110,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 79% 55%, rgba(245,237,232,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 3%  18%, rgba(245,237,232,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 44px;
  }

  .moon-icon {
    font-size: 2.6rem;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 16px rgba(201,169,110,0.5));
    animation: moonFloat 4s ease-in-out infinite;
  }

  @keyframes moonFloat {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-6px); }
  }

  header h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 6px;
  }

  header h1 em {
    font-style: italic;
    color: var(--pink-soft);
    font-weight: 400;
  }

  header p {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* CARDS */
  .card {
    background: linear-gradient(145deg, rgba(18,34,54,0.97) 0%, rgba(13,27,42,0.99) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 26px 24px;
    margin-bottom: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(245,237,232,0.04);
  }

  .card-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(201,169,110,0.25), transparent);
  }

  /* INFO BOX */
  .info-box {
    background: rgba(92,61,46,0.12);
    border: 1px solid rgba(201,169,110,0.18);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.8;
  }

  .info-box strong-label {
    display: block;
    color: var(--gold-soft);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .info-box a { color: var(--pink-soft); text-decoration: none; }
  .info-box a:hover { text-decoration: underline; }
  .info-box ol { padding-left: 16px; }
  .info-box li { margin-bottom: 3px; }

  /* FIELDS */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 7px;
    font-weight: 600;
  }

  .field input {
    width: 100%;
    background: rgba(13,27,42,0.8);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.88rem;
    padding: 11px 16px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .field input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(212,132,154,0.1);
  }

  .field input::placeholder { color: rgba(168,152,144,0.45); }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 50px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    letter-spacing: 0.02em;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: linear-gradient(135deg, var(--pink) 0%, #b85c74 100%);
    color: #fff;
    width: 100%;
    box-shadow: 0 4px 16px rgba(212,132,154,0.3);
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, var(--pink-soft) 0%, var(--pink) 100%);
    box-shadow: 0 6px 24px rgba(212,132,154,0.4);
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-size: 0.76rem;
    padding: 7px 14px;
  }

  .btn-ghost:hover { border-color: var(--pink); color: var(--pink-soft); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* USER BAR */
  #user-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: rgba(18,34,54,0.6);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 14px;
  }

  #user-bar.visible { display: flex; }

  .user-info { display: flex; align-items: center; gap: 10px; }

  #user-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--navy2);
    border: 1px solid var(--border);
  }

  #user-name { font-size: 0.85rem; font-weight: 600; color: var(--cream); }

  #user-plan {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    background: rgba(201,169,110,0.1);
    border: 1px solid rgba(201,169,110,0.2);
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 6px;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* SEARCH */
  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .search-input {
    flex: 1;
    background: linear-gradient(145deg, rgba(18,34,54,0.97), rgba(13,27,42,0.99));
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.88rem;
    padding: 12px 18px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }

  .search-input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(212,132,154,0.1);
  }

  .search-input::placeholder { color: rgba(168,152,144,0.45); }

  .btn-search {
    background: linear-gradient(135deg, var(--brown-warm) 0%, var(--brown) 100%);
    color: var(--cream);
    padding: 12px 18px;
    border-radius: 14px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(92,61,46,0.3);
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
  }

  .btn-search:hover {
    background: linear-gradient(135deg, #b8795a 0%, var(--brown-warm) 100%);
    transform: translateY(-1px);
  }

  .btn-search:active { transform: scale(0.96); }

  /* RESULTS */
  #results {
    background: linear-gradient(145deg, rgba(18,34,54,0.97), rgba(13,27,42,0.99));
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 14px;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }

  #results.visible { display: block; }

  #results h3 {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border2);
    font-weight: 700;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    cursor: pointer;
    transition: background 0.2s;
    border-bottom: 1px solid var(--border2);
  }

  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: rgba(212,132,154,0.06); }

  .result-item img {
    width: 48px; height: 48px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--navy2);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .result-meta { flex: 1; min-width: 0; }

  .result-meta strong {
    display: block;
    font-size: 0.86rem;
    font-weight: 600;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .result-meta span { font-size: 0.72rem; color: var(--text-dim); }
  .result-duration  { font-size: 0.7rem; color: var(--text-dim); flex-shrink: 0; }

  /* PLAYER CARD */
  #player-card {
    background: linear-gradient(160deg, rgba(22,38,60,0.98) 0%, rgba(13,27,42,1) 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px 24px;
    display: none;
    position: relative;
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4), inset 0 1px 0 rgba(245,237,232,0.04);
  }

  #player-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(212,132,154,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  #player-card::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  #player-card.visible { display: block; }

  .now-playing-label {
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    color: var(--pink-soft);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .breathe-dot {
    width: 6px; height: 6px;
    background: var(--pink);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--pink);
    animation: breathe 2.5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.6); }
  }

  .episode-row {
    display: flex;
    gap: 16px;
    margin-bottom: 22px;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  #ep-cover {
    width: 76px; height: 76px;
    border-radius: 14px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--navy2);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }

  .episode-text { flex: 1; min-width: 0; }

  #ep-name {
    font-size: 1rem;
    font-weight: 400;
    font-style: italic;
    line-height: 1.4;
    color: var(--cream);
    margin-bottom: 5px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  #ep-show { font-size: 0.74rem; color: var(--text-dim); font-weight: 300; }

  /* Progress */
  .progress-area { margin-bottom: 20px; position: relative; z-index: 1; }

  .progress-track {
    width: 100%;
    height: 3px;
    background: rgba(245,237,232,0.08);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--pink), var(--gold));
    border-radius: 2px;
    width: 0%;
    transition: width 0.8s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -4px; top: -3px;
    width: 9px; height: 9px;
    background: var(--pink-pale);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(212,132,154,0.6);
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    display: grid;
    place-items: center;
    transition: color 0.2s, transform 0.15s;
    padding: 0;
    border-radius: 50%;
  }

  .ctrl-btn:hover { color: var(--pink-soft); transform: scale(1.1); }
  .ctrl-btn:active { transform: scale(0.9); }

  .ctrl-btn.main {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--pink) 0%, #a85068 100%);
    color: #fff;
    box-shadow: 0 6px 20px rgba(212,132,154,0.4);
    transition: box-shadow 0.2s, transform 0.15s;
  }

  .ctrl-btn.main:hover {
    box-shadow: 0 8px 28px rgba(212,132,154,0.55);
    transform: scale(1.06);
  }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 0 0;
    border-top: 1px solid var(--border2);
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .volume-icon { color: var(--text-dim); flex-shrink: 0; }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 3px;
    background: rgba(245,237,232,0.1);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--pink-pale);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 4px rgba(212,132,154,0.5);
  }

  /* Loop */
  .loop-config {
    background: rgba(13,27,42,0.5);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 16px 18px;
    position: relative;
    z-index: 1;
  }

  .loop-config h4 {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .loop-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .loop-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }

  .toggle-track {
    width: 34px; height: 18px;
    background: rgba(245,237,232,0.08);
    border-radius: 9px;
    position: relative;
    transition: background 0.25s;
    border: 1px solid rgba(245,237,232,0.06);
    flex-shrink: 0;
  }

  .toggle-track.on {
    background: linear-gradient(135deg, var(--pink) 0%, #a85068 100%);
    border-color: transparent;
  }

  .toggle-knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    transition: left 0.25s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  .toggle-track.on .toggle-knob { left: 18px; }

  .loop-toggle { direction: rtl; }
  .loop-toggle span { font-size: 0.82rem; color: var(--text); font-weight: 400; }

  .divider-v {
    width: 1px; height: 18px;
    background: var(--border);
    flex-shrink: 0;
  }

  .count-row { display: flex; align-items: center; gap: 8px; }
  .count-row label { font-size: 0.82rem; color: var(--text-dim); }

  .count-input {
    width: 56px;
    background: rgba(13,27,42,0.8);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--cream);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 5px 8px;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }

  .count-input:focus { border-color: var(--pink); }
  .count-input:disabled { opacity: 0.3; }

  .loop-status {
    font-size: 0.73rem;
    color: var(--pink-soft);
    margin-top: 10px;
    min-height: 16px;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* FAVORITES */
  .favorites-section {
    margin-bottom: 14px;
  }

  .favorites-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .favorites-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(201,169,110,0.25), transparent);
  }

  .favorites-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .fav-slot {
    background: linear-gradient(145deg, rgba(18,34,54,0.97), rgba(13,27,42,0.99));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    min-height: 88px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .fav-slot:hover { border-color: var(--pink); transform: translateY(-1px); }
  .fav-slot:active { transform: scale(0.97); }

  .fav-slot.empty {
    border-style: dashed;
    border-color: rgba(212,132,154,0.2);
    cursor: default;
    align-items: center;
    justify-content: center;
  }

  .fav-slot.empty:hover { border-color: rgba(212,132,154,0.4); transform: none; }

  .fav-slot.active {
    border-color: var(--pink);
    background: linear-gradient(145deg, rgba(212,132,154,0.08), rgba(13,27,42,0.99));
  }

  .fav-cover {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 8px;
    object-fit: cover;
    background: var(--navy2);
    display: block;
    flex-shrink: 0;
  }

  .fav-title {
    font-size: 0.7rem;
    color: var(--cream);
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .fav-show {
    font-size: 0.62rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fav-actions {
    display: flex;
    gap: 5px;
    margin-top: auto;
  }

  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 3px;
    border-radius: 5px;
    color: var(--text-dim);
    transition: color 0.15s, background 0.15s;
    line-height: 0;
  }

  .fav-btn:hover { color: var(--pink-soft); background: rgba(212,132,154,0.1); }
  .fav-btn.save-btn { margin-left: auto; }
  .fav-btn.save-btn:hover { color: var(--gold); background: rgba(201,169,110,0.1); }

  .fav-empty-icon {
    font-size: 1.4rem;
    opacity: 0.25;
    display: block;
    margin-bottom: 4px;
  }

  .fav-empty-text {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-align: center;
    opacity: 0.5;
  }

  .fav-num {
    position: absolute;
    top: 7px; left: 8px;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    font-weight: 700;
    opacity: 0.7;
  }

  /* Status */
  #status, #app-status {
    font-size: 0.76rem;
    color: var(--text-dim);
    text-align: center;
    padding: 8px;
    min-height: 32px;
    font-weight: 300;
  }

  .error-text   { color: #e07878 !important; }
  .success-text { color: var(--gold-soft) !important; }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(212,132,154,0.2);
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  #section-setup, #section-app { width: 100%; }
  #section-app { display: none; }

  /* ── RTL ADJUSTMENTS ── */
  .card-label::after,
  .favorites-label::after {
    background: linear-gradient(to left, rgba(201,169,110,0.25), transparent);
  }

  .search-input {
    text-align: right;
  }

  .search-input::placeholder {
    text-align: right;
    direction: rtl;
  }

  .field input::placeholder {
    text-align: right;
    direction: rtl;
  }

  .info-box ol {
    padding-right: 16px;
    padding-left: 0;
  }

  .now-playing-label {
    flex-direction: row-reverse;
    justify-content: flex-end;
  }

  .now-playing-label > div:first-child {
    order: 1;
  }

  .now-playing-label > span,
  .now-playing-label > .breathe-dot {
    margin-right: 0;
  }

  .fav-num {
    left: auto;
    right: 8px;
  }

  .fav-btn.save-btn {
    margin-left: 0;
    margin-right: auto;
  }

  .loop-status {
    text-align: right;
  }

  .time-row {
    direction: ltr; /* keep times left-to-right */
  }

  #user-plan {
    margin-left: 0;
    margin-right: 6px;
  }

  .volume-row {
    direction: ltr;
  }

  /* LINK INPUT */
  .link-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .link-input {
    flex: 1;
    background: linear-gradient(145deg, rgba(18,34,54,0.97), rgba(13,27,42,0.99));
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.82rem;
    padding: 11px 16px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    direction: ltr;
    text-align: left;
  }
  .link-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,0.1); }
  .link-input::placeholder { color: rgba(168,152,144,0.4); direction: ltr; text-align: left; }
  .btn-link {
    background: linear-gradient(135deg, rgba(201,169,110,0.3) 0%, rgba(201,169,110,0.15) 100%);
    color: var(--gold-soft);
    padding: 11px 16px;
    border-radius: 14px;
    flex-shrink: 0;
    border: 1px solid rgba(201,169,110,0.25);
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    font-size: 0.82rem;
    font-weight: 600;
    font-family: inherit;
  }
  .btn-link:hover { background: linear-gradient(135deg, rgba(201,169,110,0.4), rgba(201,169,110,0.25)); transform: translateY(-1px); }
  .btn-link:active { transform: scale(0.96); }

  /* BROWSE PANEL */
  #browse-panel {
    background: linear-gradient(145deg, rgba(18,34,54,0.97), rgba(13,27,42,0.99));
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 14px;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  #browse-panel.visible { display: block; }
  .browse-tabs {
    display: flex;
    border-bottom: 1px solid var(--border2);
    padding: 0 6px;
  }
  .browse-tab {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.05em;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .browse-tab.active { color: var(--pink-soft); border-bottom-color: var(--pink); }
  .browse-tab:hover:not(.active) { color: var(--text); }
  .browse-list { max-height: 260px; overflow-y: auto; }
  .browse-list::-webkit-scrollbar { width: 4px; }
  .browse-list::-webkit-scrollbar-track { background: transparent; }
  .browse-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .browse-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border2);
  }
  .browse-item:last-child { border-bottom: none; }
  .browse-item:hover { background: rgba(212,132,154,0.06); }
  .browse-item img {
    width: 42px; height: 42px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--navy2);
  }
  .browse-item-meta { flex: 1; min-width: 0; }
  .browse-item-meta strong {
    display: block;
    font-size: 0.84rem;
    font-weight: 600;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .browse-item-meta span { font-size: 0.7rem; color: var(--text-dim); }
  .browse-header {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    padding: 12px 18px 8px;
    border-bottom: 1px solid var(--border2);
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .browse-header:hover { color: var(--gold-soft); }
  .browse-back {
    font-size: 0.75rem;
    opacity: 0.6;
    transition: opacity 0.15s;
  }

  /* HEART SAVE BUTTONS — filled when slot occupied */
  .fav-btn.save-btn svg.heart-empty { display: block; }
  .fav-btn.save-btn svg.heart-filled { display: none; }
  .fav-btn.save-btn.occupied svg.heart-empty { display: none; }
  .fav-btn.save-btn.occupied svg.heart-filled { display: block; }
  .fav-btn.save-btn.occupied { color: var(--pink); }
  .fav-btn.save-btn.occupied:hover { color: var(--gold); }

  /* ADD SLOT BUTTON */
  .fav-slot.add-slot {
    border-style: dashed;
    border-color: rgba(201,169,110,0.2);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .fav-slot.add-slot:hover { border-color: var(--gold); transform: translateY(-1px); }
  .fav-add-icon { font-size: 1.2rem; opacity: 0.35; color: var(--gold); }
  .fav-add-text { font-size: 0.62rem; color: var(--text-dim); opacity: 0.5; }

  /* PLAYLIST SAVE BUTTON */
  .playlist-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border2);
    position: relative;
    z-index: 1;
  }
  .btn-playlist {
    flex: 1;
    background: linear-gradient(135deg, rgba(29,185,84,0.15) 0%, rgba(29,185,84,0.08) 100%);
    border: 1px solid rgba(29,185,84,0.25);
    border-radius: 10px;
    color: #1db954;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 9px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-playlist:hover { background: linear-gradient(135deg, rgba(29,185,84,0.25), rgba(29,185,84,0.15)); transform: translateY(-1px); }
  .btn-playlist:active { transform: scale(0.97); }
  .btn-playlist.done { color: var(--gold-soft); border-color: rgba(201,169,110,0.3); background: linear-gradient(135deg, rgba(201,169,110,0.12), rgba(201,169,110,0.06)); }

  /* PREVIEW */
  .preview-wrap {
    position: relative;
    margin-bottom: 16px;
    border-radius: 20px;
    overflow: hidden;
  }

  .preview-ui {
    filter: blur(3px);
    opacity: 0.45;
    pointer-events: none;
    user-select: none;
    transform: scale(0.98);
    transform-origin: top center;
  }

  .preview-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: radial-gradient(ellipse at center, rgba(13,27,42,0.55) 0%, rgba(13,27,42,0.2) 100%);
    border-radius: 20px;
    pointer-events: none;
  }

  .preview-lock {
    font-size: 1.6rem;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    animation: moonFloat 4s ease-in-out infinite;
  }

  .preview-hint {
    font-size: 0.72rem;
    color: var(--pink-pale);
    letter-spacing: 0.1em;
    font-weight: 300;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <span class="moon-icon">&#x1F319;</span>
    <h1><em>עוד</em> פעם</h1>
    <p>הסיפור שאינו נגמר</p>
  </header>

  <!-- SETUP -->
  <div id="section-setup">

    <!-- PREVIEW -->
    <div class="preview-wrap">
      <div class="preview-ui">

        <!-- fake favorites -->
        <div style="margin-bottom:14px">
          <div style="font-size:0.62rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px">
            &#x2665; מועדפים
            <span style="flex:1;height:1px;background:linear-gradient(to left,rgba(201,169,110,0.25),transparent)"></span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
            <div style="background:linear-gradient(145deg,rgba(18,34,54,0.97),rgba(13,27,42,0.99));border:1px solid var(--border);border-radius:14px;padding:12px;min-height:88px;display:flex;flex-direction:column;gap:6px">
              <div style="width:100%;aspect-ratio:1;border-radius:8px;background:linear-gradient(135deg,rgba(212,132,154,0.2),rgba(92,61,46,0.3))"></div>
              <div style="height:8px;border-radius:4px;background:rgba(245,237,232,0.12);width:90%"></div>
              <div style="height:6px;border-radius:3px;background:rgba(245,237,232,0.07);width:65%"></div>
            </div>
            <div style="background:linear-gradient(145deg,rgba(18,34,54,0.97),rgba(13,27,42,0.99));border:1px dashed rgba(212,132,154,0.2);border-radius:14px;padding:12px;min-height:88px;display:flex;align-items:center;justify-content:center">
              <span style="font-size:1.1rem;opacity:0.2;color:var(--pink)">&#x2665;</span>
            </div>
            <div style="background:linear-gradient(145deg,rgba(18,34,54,0.97),rgba(13,27,42,0.99));border:1px dashed rgba(212,132,154,0.2);border-radius:14px;padding:12px;min-height:88px;display:flex;align-items:center;justify-content:center">
              <span style="font-size:1.1rem;opacity:0.2;color:var(--pink)">&#x2665;</span>
            </div>
          </div>
        </div>

        <!-- fake player card -->
        <div style="background:linear-gradient(160deg,rgba(22,38,60,0.98),rgba(13,27,42,1));border:1px solid var(--border);border-radius:24px;padding:24px 22px 20px">

          <div style="font-size:0.6rem;letter-spacing:0.22em;color:var(--pink-soft);text-transform:uppercase;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px">
            <div style="width:6px;height:6px;background:var(--pink);border-radius:50%;box-shadow:0 0 6px var(--pink)"></div>
            מתנגן עכשיו
          </div>

          <div style="display:flex;gap:14px;margin-bottom:18px;align-items:center">
            <div style="width:72px;height:72px;border-radius:12px;background:linear-gradient(135deg,rgba(92,61,46,0.5),rgba(212,132,154,0.2));flex-shrink:0"></div>
            <div style="flex:1">
              <div style="height:10px;border-radius:5px;background:rgba(245,237,232,0.15);width:88%;margin-bottom:8px"></div>
              <div style="height:10px;border-radius:5px;background:rgba(245,237,232,0.15);width:65%;margin-bottom:8px"></div>
              <div style="height:7px;border-radius:4px;background:rgba(245,237,232,0.07);width:50%"></div>
            </div>
          </div>

          <div style="margin-bottom:18px">
            <div style="height:3px;background:rgba(245,237,232,0.08);border-radius:2px;margin-bottom:8px;overflow:hidden">
              <div style="height:100%;width:38%;background:linear-gradient(to right,var(--pink),var(--gold));border-radius:2px"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.68rem;color:var(--text-dim)">
              <span>14:22</span><span>38:47</span>
            </div>
          </div>

          <div style="display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:18px">
            <div style="width:20px;height:20px;border-radius:50%;background:rgba(245,237,232,0.06)"></div>
            <div style="width:22px;height:22px;border-radius:50%;background:rgba(245,237,232,0.06)"></div>
            <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#a85068)"></div>
            <div style="width:22px;height:22px;border-radius:50%;background:rgba(245,237,232,0.06)"></div>
            <div style="width:20px;height:20px;border-radius:50%;background:rgba(245,237,232,0.06)"></div>
          </div>

          <div style="background:rgba(13,27,42,0.5);border:1px solid var(--border2);border-radius:14px;padding:14px 16px">
            <div style="height:7px;border-radius:4px;background:rgba(201,169,110,0.2);width:40%;margin-bottom:12px"></div>
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:34px;height:18px;border-radius:9px;background:linear-gradient(135deg,var(--pink),#a85068)"></div>
              <div style="height:7px;border-radius:4px;background:rgba(245,237,232,0.08);width:50px"></div>
              <div style="height:7px;border-radius:4px;background:rgba(245,237,232,0.06);width:30px"></div>
              <div style="width:40px;height:26px;border-radius:7px;background:rgba(245,237,232,0.06)"></div>
              <div style="height:7px;border-radius:4px;background:rgba(245,237,232,0.06);width:30px"></div>
            </div>
          </div>

        </div>

      </div><!-- /preview-ui -->

      <div class="preview-overlay">
        <span class="preview-lock">&#x1F512;</span>
        <span class="preview-hint">התחברו כדי להתחיל</span>
      </div>
    </div><!-- /preview-wrap -->

    <div class="card">
      <div class="card-label">התחברו ל־Spotify</div>
      <input type="hidden" id="client-id-input" value="" />
      <button class="btn btn-primary" onclick="startAuth()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        התחברו עם Spotify
      </button>
    </div>
    <div id="status"></div>
  </div>

  <!-- APP -->
  <div id="section-app">

    <div id="user-bar">
      <div class="user-info">
        <img id="user-avatar" src="" alt="avatar" />
        <div>
          <span id="user-name">&#x2014;</span>
          <span id="user-plan">Premium</span>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="logout()">התנתקות</button>
    </div>

    <div class="search-row">
      <input class="search-input" type="text" id="search-input"
        placeholder="...חפשו פרק או סיפור"
        onkeydown="if(event.key==='Enter')searchEpisodes()" />
      <button class="btn-search" onclick="searchEpisodes()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="btn-search" style="background:linear-gradient(135deg,rgba(26,48,80,0.9),rgba(13,27,42,0.99));border:1px solid var(--border)" title="עיון ברשימות" onclick="toggleBrowse()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>

    <div class="link-row">
      <input class="link-input" type="text" id="link-input"
        placeholder="https://open.spotify.com/episode/..."
        onkeydown="if(event.key==='Enter')openSpotifyLink()" />
      <button class="btn-link" onclick="openSpotifyLink()">פתחו קישור</button>
    </div>

    <div id="browse-panel">
      <div class="browse-header" id="browse-header">
        <span id="browse-title">הספרייה שלי</span>
      </div>
      <div class="browse-tabs" id="browse-tabs">
        <button class="browse-tab active" onclick="switchBrowseTab('playlists')">רשימות השמעה</button>
        <button class="browse-tab" onclick="switchBrowseTab('liked')">אהבתי</button>
      </div>
      <div class="browse-list" id="browse-list"></div>
    </div>

    <div class="favorites-section" id="favorites-section">
      <div class="favorites-label">&#x2665; מועדפים</div>
      <div class="favorites-grid" id="favorites-grid">
        <!-- rendered by JS -->
      </div>
    </div>

    <div id="results">
      <h3>פרקים</h3>
      <div id="results-list"></div>
    </div>

    <div id="player-card">

      <div class="now-playing-label">
        <div class="breathe-dot"></div>
        מתנגן עכשיו
        <div id="fav-save-btns" style="margin-left:auto;display:flex;gap:6px"></div>
      </div>

      <div class="episode-row">
        <img id="ep-cover" src="" alt="cover" />
        <div class="episode-text">
          <div id="ep-name">&#x2014;</div>
          <div id="ep-show">&#x2014;</div>
        </div>
      </div>

      <div class="progress-area">
        <div class="progress-track" id="progress-track" onclick="seekTo(event)">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time-row">
          <span id="time-cur">0:00</span>
          <span id="time-dur">0:00</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" title="להתחיל מחדש" onclick="restartEpisode()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="skip(-15)" title="15 שניות אחורה">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M11.5 12 4 7v10zm.5 0 7.5-5v10z"/></svg>
        </button>
        <button class="ctrl-btn main" onclick="togglePlayPause()">
          <svg id="icon-play"  width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>

<script>

let currentEpisodeUri = null, currentEpisodeDurationMs = 0;

// ── FAVORITES ──
const DEFAULT_FAVORITES = [
  {
    uri: 'spotify:episode:6Q1aexD5cFMpWOYIxwgnZc',
    name: null, // will be fetched from API after login
    show: null,
    image: null,
    startMs: 15000
  },
  null,
  null
];

function loadFavorites() {
  try {
    const stored = localStorage.getItem('sl_favorites');
    if (stored) return JSON.parse(stored);
  } catch(e) {}
  return [...DEFAULT_FAVORITES];
}

function saveFavoritesToStorage(favs) {
  localStorage.setItem('sl_favorites', JSON.stringify(favs));
}

function saveFavorite(slot) {
  if (!currentEpisodeUri) return;
  const favs = loadFavorites();
  favs[slot] = {
    uri:      currentEpisodeUri,
    name:     document.getElementById('ep-name').textContent,
    show:     document.getElementById('ep-show').textContent,
    image:    document.getElementById('ep-cover').src,
    startMs:  0
  };
  saveFavoritesToStorage(favs);
  renderFavorites();
  updateSaveHearts();
  setAppStatus('נשמר במועדפים ' + (slot + 1), 'success');
}

function clearFavorite(slot, e) {
  e.stopPropagation();
  const favs = loadFavorites();
  favs[slot] = null;
  saveFavoritesToStorage(favs);
  renderFavorites();
}

async function playFavorite(slot) {
  const favs = loadFavorites();
  const fav  = favs[slot];
  if (!fav || !deviceId) return;
  currentEpisodeUri        = fav.uri;
  currentEpisodeDurationMs = 0;
  repeatCount              = 0;
  updateLoopStatus();
  document.getElementById('ep-name').textContent = fav.name  || '...טוען';
  document.getElementById('ep-show').textContent = fav.show  || '';
  document.getElementById('ep-cover').src        = fav.image || '';
  document.getElementById('player-card').classList.add('visible');
  document.getElementById('results').classList.remove('visible');
  await playEpisode(fav.startMs || 0);
  renderFavorites();
  updateSaveHearts();
}

async function fetchAndCacheFavoriteMeta(slot, uri) {
  // Extract episode ID from URI
  const epId = uri.replace('spotify:episode:', '');
  try {
    const res  = await spotifyFetch(`https://api.spotify.com/v1/episodes/${epId}?market=from_token`);
    if (!res.ok) return;
    const data = await res.json();
    const favs = loadFavorites();
    if (favs[slot] && favs[slot].uri === uri) {
      favs[slot].name  = data.name;
      favs[slot].show  = data.show?.name || '';
      favs[slot].image = data.images?.[0]?.url || '';
      saveFavoritesToStorage(favs);
      renderFavorites();
    }
  } catch(e) {}
}

function renderFavorites() {
  const favs = loadFavorites();
  const grid = document.getElementById('favorites-grid');
  grid.innerHTML = favs.map((fav, i) => {
    if (!fav) return `
      <div class="fav-slot empty">
        <span class="fav-num">${i + 1}</span>
        <span class="fav-empty-icon">&#x2665;</span>
        <span class="fav-empty-text">מקום פנוי</span>
      </div>`;

    const isActive = fav.uri === currentEpisodeUri;
    return `
      <div class="fav-slot${isActive ? ' active' : ''}" onclick="playFavorite(${i})">
        <span class="fav-num">${i + 1}</span>
        ${fav.image
          ? `<img class="fav-cover" src="${esc(fav.image)}" alt="" />`
          : `<div class="fav-cover" style="background:var(--navy3);border-radius:8px;display:flex;align-items:center;justify-content:center"><span style="font-size:1.4rem;opacity:0.3">&#x1F319;</span></div>`}
        <div class="fav-title">${esc(fav.name || '...טוען')}</div>
        <div class="fav-show">${esc(fav.show || '')}</div>
        <div class="fav-actions">
          <button class="fav-btn" title="להסיר" onclick="clearFavorite(${i}, event)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>`;
  }).join('') + (favs.length < 5 ? `
      <div class="fav-slot add-slot" onclick="addFavoriteSlot()">
        <span class="fav-add-icon">+</span>
        <span class="fav-add-text">הוסיפו מועדף</span>
      </div>` : '');
}

async function initFavorites() {
  // Fetch metadata for any favorites that don't have it yet (e.g. the pre-saved one)
  const favs = loadFavorites();
  for (let i = 0; i < favs.length; i++) {
    if (favs[i] && !favs[i].name) {
      fetchAndCacheFavoriteMeta(i, favs[i].uri);
    }
  }
  renderFavorites();
}

// ── OPEN SPOTIFY LINK ──
function openSpotifyLink() {
  const raw = document.getElementById('link-input').value.trim();
  if (!raw) return;
  // Support formats: open.spotify.com/episode/ID or spotify:episode:ID
  let episodeId = null;
  const urlMatch = raw.match(/spotify\.com\/episode\/([A-Za-z0-9]+)/);
  const uriMatch = raw.match(/spotify:episode:([A-Za-z0-9]+)/);
  if (urlMatch) episodeId = urlMatch[1];
  else if (uriMatch) episodeId = uriMatch[1];
  if (!episodeId) { setAppStatus('קישור לא תקין. נסו קישור לפרק מ-Spotify.', 'error'); return; }

  // Parse t= timestamp if present
  let startMs = 0;
  const tMatch = raw.match(/[?&]t=(\d+)/);
  if (tMatch) startMs = parseInt(tMatch[1]) * 1000;

  setAppStatus('<span class="spinner"></span> טוען פרק...', '');
  spotifyFetch(`https://api.spotify.com/v1/episodes/${episodeId}?market=from_token`)
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error.message);
      document.getElementById('link-input').value = '';
      selectEpisodeObj({
        uri: data.uri,
        name: data.name,
        show: data.show?.name || '',
        image: data.images?.[0]?.url || '',
        durationMs: data.duration_ms,
        startMs
      });
    })
    .catch(e => setAppStatus('שגיאה בטעינת הפרק: ' + e.message, 'error'));
}

let browseTab = 'playlists';

function toggleBrowse() {
  browseVisible = !browseVisible;

  if (browseVisible) {
    panel.classList.add('visible');
    loadBrowseTab(browseTab);

function switchBrowseTab(tab) {
  browseTab = tab;
  currentPlaylistId = null;
  document.querySelectorAll('.browse-tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'playlists') || (i === 1 && tab === 'liked'));

  loadBrowseTab(tab);
}

async function loadBrowseTab(tab) {
  const list = document.getElementById('browse-list');
  list.innerHTML = '<div style="padding:16px;text-align:center"><span class="spinner"></span></div>';
  try {
    if (tab === 'playlists') {
      const res = await spotifyFetch('https://api.spotify.com/v1/me/playlists?limit=20');
      const data = await res.json();
      renderBrowseItems(data.items || [], 'playlist');
    } else {
      const res = await spotifyFetch('https://api.spotify.com/v1/me/episodes?limit=20&market=from_token');
      const data = await res.json();
      renderBrowseItems((data.items || []).map(i => i.episode), 'episode');
    }
  } catch(e) { list.innerHTML = `<div style="padding:16px;font-size:0.8rem;color:var(--text-dim);text-align:center">${e.message}</div>`; }
}

async function loadPlaylistEpisodes(playlistId, playlistName) {
  currentPlaylistId = playlistId;
  document.getElementById('browse-title').textContent = playlistName;
  const list = document.getElementById('browse-list');
  list.innerHTML = '<div style="padding:16px;text-align:center"><span class="spinner"></span></div>';
  try {
    const res = await spotifyFetch(`https://api.spotify.com/v1/playlists/${playlistId}/tracks?limit=30&market=from_token`);
    const data = await res.json();
    const episodes = (data.items || [])
      .filter(i => i.track?.type === 'episode')
      .map(i => i.track);
    if (!episodes.length) {
      list.innerHTML = '<div style="padding:16px;font-size:0.8rem;color:var(--text-dim);text-align:center">לא נמצאו פרקים ברשימה זו.</div>';
      return;
    }
    renderBrowseItems(episodes, 'episode');
  } catch(e) { list.innerHTML = `<div style="padding:16px;font-size:0.8rem;color:var(--text-dim);text-align:center">${e.message}</div>`; }
}

function renderBrowseItems(items, type) {
  const list = document.getElementById('browse-list');
  if (!items.length) { list.innerHTML = '<div style="padding:16px;font-size:0.8rem;color:var(--text-dim);text-align:center">ריק.</div>'; return; }
  list.innerHTML = items.map(item => {
    if (!item) return '';
    const img = item.images?.[0]?.url || '';
    const name = esc(item.name || '');
    const sub = type === 'playlist'
      ? `${item.tracks?.total || ''} פריטים`
      : esc(item.show?.name || '');
    const onclick = type === 'playlist'
      ? `loadPlaylistEpisodes('${item.id}', '${esc(item.name || '')}')`
      : `selectEpisodeFromBrowse(${JSON.stringify({
          uri: item.uri,
          name: item.name,
          show: item.show?.name || '',
          image: img,
          durationMs: item.duration_ms
        }).replace(/"/g,'&quot;')})`;
    return `
      <div class="browse-item" onclick="${onclick}">
        ${img ? `<img src="${img}" alt=""/>` : `<div style="width:42px;height:42px;border-radius:8px;background:var(--navy2);flex-shrink:0"></div>`}
        <div class="browse-item-meta">
          <strong>${name}</strong>
          <span>${sub}</span>
        </div>
        ${type === 'playlist' ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-dim);flex-shrink:0"><polyline points="15 18 9 12 15 6"/></svg>' : ''}
      </div>`;
  }).join('');
}

function selectEpisodeFromBrowse(ep) {
  document.getElementById('browse-panel').classList.remove('visible');
  browseVisible = false;
  currentPlaylistId = null;
  selectEpisodeObj(ep);

function saveFavoriteConfirm(slot) {
  if (!currentEpisodeUri) return;
  const favs = loadFavorites();

    show:    document.getElementById('ep-show').textContent,
    image:   document.getElementById('ep-cover').src,
    startMs: 0

  saveFavoritesToStorage(favs);
  renderFavorites();
  updateSaveHearts();
  setAppStatus('נוסף מועדף חדש!', 'success');

// ── PKCE HELPERS ──
function base64urlEncode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
async function generatePKCE() {
  const verifier = base64urlEncode(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = base64urlEncode(
    await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier))
  );
  return { verifier, challenge };
}

window.onload = async () => {
  const redirectBase = window.location.href.split('?')[0].split('#')[0];
  const HARDCODED_ID = '04a1c8d3de3c473c9ef1360c687ad8c9';
  localStorage.setItem('sp_client_id', HARDCODED_ID);
  document.getElementById('client-id-input').value = HARDCODED_ID;

  // Check for OAuth error
  const params = new URLSearchParams(window.location.search);
  const error  = params.get('error');
  const code   = params.get('code');

  if (error) {
    window.history.replaceState(null, '', window.location.pathname);
    setStatus('Spotify דחה גישה: ' + error, 'error');
    return;
  }

  if (code) {
    // Keep setup section visible so status messages show during token exchange
    document.getElementById('section-setup').style.display = '';
    document.getElementById('section-app').style.display = 'none';
    setStatus('<span class="spinner"></span> מתחברים ל־Spotify...', '');
    window.history.replaceState(null, '', window.location.pathname);
    await exchangeCode(code);
    return;
  }

  // Restore existing token - accept even if expiry missing (legacy saves)
  const stored = localStorage.getItem('sp_token');
  const expiry  = localStorage.getItem('sp_token_expiry');
  const expired = expiry ? Date.now() > parseInt(expiry) : false;

  if (stored && !expired) {
    accessToken = stored;
    initApp();
  } else {
    // Always ensure setup is visible as fallback
    document.getElementById('section-setup').style.display = '';
    document.getElementById('section-app').style.display = 'none';
    if (stored && expired) {
      ['sp_token','sp_token_expiry'].forEach(k => localStorage.removeItem(k));
      setStatus('פג תוקף החיבור. התחברו שוב.', 'error');
    }
  }
};

async function startAuth() {
  const id = document.getElementById('client-id-input').value.trim();
  if (!id) { setStatus('נא להזין את ה־Client ID של Spotify.', 'error'); return; }
  localStorage.setItem('sp_client_id', id);
  const { verifier, challenge } = await generatePKCE();
  localStorage.setItem('sp_pkce_verifier', verifier);
  const redir = window.location.href.split('?')[0].split('#')[0];
  window.location.href = `https://accounts.spotify.com/authorize?response_type=code`
    + `&client_id=${encodeURIComponent(id)}`
    + `&scope=${encodeURIComponent(SCOPES)}`
    + `&redirect_uri=${encodeURIComponent(redir)}`
    + `&code_challenge_method=S256`
    + `&code_challenge=${challenge}`;
}

async function exchangeCode(code) {
  const verifier = localStorage.getItem('sp_pkce_verifier');
  const id       = localStorage.getItem('sp_client_id');
  const redir    = window.location.href.split('?')[0].split('#')[0];

  if (!verifier || !id) {
    setStatus('שגיאת אימות. נסו להתחבר שוב.', 'error');
    return;
  }

  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type:    'authorization_code',
        code,
        redirect_uri:  redir,
        client_id:     id,
        code_verifier: verifier
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.error || JSON.stringify(data));
    accessToken = data.access_token;
    localStorage.setItem('sp_token',        accessToken);
    localStorage.setItem('sp_token_expiry', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) localStorage.setItem('sp_refresh_token', data.refresh_token);
    localStorage.removeItem('sp_pkce_verifier');
    initApp();
  } catch(e) {
    setStatus('החיבור נכשל: ' + e.message + '. נסו להתחבר שוב.', 'error');
  }
}

function logout() {
  ['sp_token','sp_token_expiry','sp_refresh_token','sp_pkce_verifier'].forEach(k => localStorage.removeItem(k));
  accessToken = null;
  if (player) { player.disconnect(); player = null; }
  stopProgressInterval();
  document.getElementById('section-setup').style.display = '';
  document.getElementById('section-app').style.display = 'none';
}

async function initApp() {
  document.getElementById('section-setup').style.display = 'none';
  document.getElementById('section-app').style.display = 'block';
  await fetchUser();
  initPlayer();
  initFavorites();
}

async function fetchUser() {
  try {
    const res = await spotifyFetch('https://api.spotify.com/v1/me');
    if (!res.ok) throw new Error();
    const d = await res.json();
    document.getElementById('user-bar').classList.add('visible');
    document.getElementById('user-name').textContent = d.display_name || d.id;
    document.getElementById('user-plan').textContent = d.product === 'premium' ? 'פרימיום' : d.product;
    if (d.images?.[0]) document.getElementById('user-avatar').src = d.images[0].url;
  } catch { localStorage.removeItem('sp_token'); location.reload(); }
}

window.onSpotifyWebPlaybackSDKReady = () => { if (accessToken) initPlayer(); };

function initPlayer() {
  if (player) return;
  player = new Spotify.Player({ name: 'Story Looper', getOAuthToken: cb => cb(accessToken), volume: 0.7 });
  player.addListener('ready', ({ device_id }) => { deviceId = device_id; setAppStatus('מחכה לספר...', ''); });
  player.addListener('not_ready', () => setAppStatus('הנגן התנתק', 'error'));
  player.addListener('player_state_changed', state => {
    if (!state) return;
    isPlaying = !state.paused; positionMs = state.position; currentEpisodeDurationMs = state.duration;
    updatePlayPauseIcon(); updateProgress();
    if (state.paused && state.position === 0 && state.restrictions && !isPlaying) handleEpisodeEnd();
  });
  player.addListener('initialization_error', ({ message }) => setAppStatus(message, 'error'));
  player.addListener('authentication_error', () => { localStorage.removeItem('sp_token'); location.reload(); });
  player.addListener('account_error', ({ message }) => setAppStatus('נדרש Premium: ' + message, 'error'));
  player.connect();
}

async function searchEpisodes() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  setAppStatus('<span class="spinner"></span> מחפשים...', '');
  try {
    const res = await spotifyFetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=episode&limit=8&market=from_token`);
    const data = await res.json();
    renderResults(data.episodes?.items || []);
    setAppStatus('', '');
  } catch(e) { setAppStatus('החיפוש נכשל: ' + e.message, 'error'); }
}

function renderResults(episodes) {
  const list = document.getElementById('results-list');
  const box  = document.getElementById('results');
  if (!episodes.length) {
    list.innerHTML = '<div style="padding:18px;font-size:0.8rem;color:var(--text-dim);text-align:center">לא נמצאו פרקים.</div>';
    box.classList.add('visible'); return;
  }
  list.innerHTML = episodes.map(ep => `
    <div class="result-item" onclick="selectEpisode(${JSON.stringify({
      uri:ep.uri, name:ep.name, show:ep.show?.name||'', image:ep.images?.[0]?.url||'', durationMs:ep.duration_ms
    }).replace(/"/g,'&quot;')})">
      <img src="${ep.images?.[1]?.url||ep.images?.[0]?.url||''}" alt="" loading="lazy"/>
      <div class="result-meta">
        <strong>${esc(ep.name)}</strong>
        <span>${esc(ep.show?.name||'')} &middot; ${fmtMs(ep.duration_ms)}</span>
      </div>
      <div class="result-duration">${fmtMs(ep.duration_ms)}</div>
    </div>`).join('');
  box.classList.add('visible');
}

async function selectEpisodeObj(ep) {
  if (!deviceId) { setAppStatus('הנגן עדיין לא מוכן, המתינו רגע...', 'error'); return; }
  currentEpisodeUri = ep.uri; currentEpisodeDurationMs = ep.durationMs || 0; repeatCount = 0; updateLoopStatus();
  document.getElementById('ep-name').textContent = ep.name;
  document.getElementById('ep-show').textContent = ep.show;
  document.getElementById('ep-cover').src = ep.image || '';
  document.getElementById('player-card').classList.add('visible');
  document.getElementById('results').classList.remove('visible');
  // Reset playlist button
  const pb = document.getElementById('btn-add-playlist');
  if (pb) { pb.classList.remove('done'); pb.disabled = false; pb.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg> הוסיפו לפלייליסט`; }
  renderFavorites();
  updateSaveHearts();
  setAppStatus('', '');
  await playEpisode(ep.startMs || 0);
}

async function selectEpisode(ep) {
  await selectEpisodeObj(ep);
}

async function playEpisode(startMs = 0) {
  try {
    const res = await spotifyFetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`,
      { method:'PUT', body:JSON.stringify({ uris:[currentEpisodeUri], position_ms: startMs }) });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message||res.status); }
    startProgressInterval(); setAppStatus('', '');
  } catch(e) { setAppStatus('שגיאת ניגון: ' + e.message, 'error'); }
}

async function togglePlayPause() { if (player) await player.togglePlay(); }
async function skip(s) {
  if (!player) return;
  const state = await player.getCurrentState(); if (!state) return;
  await player.seek(Math.max(0, Math.min(state.position + s*1000, state.duration)));
}
async function restartEpisode() { if (player) await player.seek(0); }
async function skipToEnd() { if (player && currentEpisodeDurationMs) await player.seek(Math.max(0, currentEpisodeDurationMs-3000)); }
async function seekTo(evt) {
  if (!player || !currentEpisodeDurationMs) return;
  const r = document.getElementById('progress-track').getBoundingClientRect();
  await player.seek(Math.floor(((evt.clientX-r.left)/r.width)*currentEpisodeDurationMs));
}
async function setVolume(v) { if (player) await player.setVolume(v/100); }

function toggleUnlimited() {
  loopUnlimited = !loopUnlimited;
  const t = document.getElementById('unlimited-toggle');
  loopUnlimited ? t.classList.add('on') : t.classList.remove('on');
  document.getElementById('repeat-count').disabled = loopUnlimited;
  updateLoopStatus();
}

function updateLoopStatus() {
  const el = document.getElementById('loop-status');
  repeatTarget = parseInt(document.getElementById('repeat-count').value)||3;
  if (!currentEpisodeUri) { el.textContent=''; return; }
  if (loopUnlimited) el.textContent = `הסיפור לא נגמר... ${repeatCount} פעמים עד כה`;
  else el.textContent = `${repeatCount} מתוך ${repeatTarget} השמעות הושלמו`;
}

async function handleEpisodeEnd() {
  repeatCount++;
  repeatTarget = parseInt(document.getElementById('repeat-count').value)||3;
  updateLoopStatus();
  if (loopUnlimited || repeatCount < repeatTarget) await playEpisode();
  else {
    setAppStatus(`חלומות מתוקים... הושמע ${repeatCount} פעמים הלילה`, 'success');
    isPlaying = false; updatePlayPauseIcon(); stopProgressInterval();
  }
}

function startProgressInterval() { stopProgressInterval(); progressInterval = setInterval(pollProgress, 1000); }
function stopProgressInterval() { if (progressInterval) { clearInterval(progressInterval); progressInterval = null; } }

async function pollProgress() {
  if (!player) return;
  const state = await player.getCurrentState(); if (!state) return;
  isPlaying = !state.paused; positionMs = state.position; currentEpisodeDurationMs = state.duration;
  updatePlayPauseIcon(); updateProgress();
  if (!state.paused && state.position===0 && state.track_window.previous_tracks.length>0) handleEpisodeEnd();
}

function updateProgress() {
  if (!currentEpisodeDurationMs) return;
  document.getElementById('progress-fill').style.width = ((positionMs/currentEpisodeDurationMs)*100)+'%';
  document.getElementById('time-cur').textContent = fmtMs(positionMs);
  document.getElementById('time-dur').textContent = fmtMs(currentEpisodeDurationMs);
}

function updatePlayPauseIcon() {
  document.getElementById('icon-play').classList.toggle('hidden', isPlaying);
  document.getElementById('icon-pause').classList.toggle('hidden', !isPlaying);
}

function spotifyFetch(url, opts={}) {
  return fetch(url, { ...opts, headers: { 'Authorization':`Bearer ${accessToken}`, 'Content-Type':'application/json', ...(opts.headers||{}) } });
}
function fmtMs(ms) { const t=Math.floor(ms/1000),m=Math.floor(t/60),s=t%60; return `${m}:${String(s).padStart(2,'0')}`; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setStatus(msg, type='') {
  const el=document.getElementById('status'); el.innerHTML=msg;
  el.className = type==='error'?'error-text':type==='success'?'success-text':'';
}
function setAppStatus(msg, type='') {
  const el=document.getElementById('app-status'); el.innerHTML=msg;
  el.className = type==='error'?'error-text':type==='success'?'success-text':'';
}
</script>
</body>
</html>
